<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HumanArchive — Đóng góp</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#8b4513" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="apple-touch-icon" href="icons/icon.svg" />
</head>
<body>
<header>
  <h1 data-i18n="submit.title">Đóng góp một ký ức</h1>
  <p class="tagline" data-i18n="submit.tagline"></p>
  <nav>
    <a href="index.html" data-i18n="nav.back_browse">← Archive browser</a>
  </nav>
</header>

<div id="update-banner" class="update-banner" hidden>
  <span data-i18n="pwa.update_available"></span>
  <button id="reload-btn" data-i18n="pwa.reload"></button>
</div>

<main>

<section>
  <h2 data-i18n="submit.quickstart_title">Hướng dẫn nhanh</h2>
  <ol class="muted small">
    <li data-i18n="submit.quickstart_1"></li>
    <li data-i18n="submit.quickstart_2"></li>
    <li data-i18n-html="submit.quickstart_3"></li>
    <li data-i18n-html="submit.quickstart_4"></li>
    <li data-i18n="submit.quickstart_5"></li>
  </ol>
  <div id="draft-indicator" class="muted small" hidden>
    <span data-i18n="submit.draft_saved"></span>
    <button id="draft-clear" type="button" data-i18n="submit.draft_clear"></button>
  </div>
</section>

<section>
  <h2 data-i18n="submit.section.event">Thông tin sự kiện</h2>
  <div class="form-grid">
    <label><span data-i18n="submit.field.event_name"></span>
      <input id="ev-name" required maxlength="200" />
    </label>
    <label><span data-i18n="submit.field.event_date"></span>
      <input id="ev-date" required data-i18n-placeholder="submit.field.event_date_placeholder" />
    </label>
    <label><span data-i18n="submit.field.event_location"></span>
      <input id="ev-location" />
    </label>
    <label><span data-i18n="submit.field.event_tags"></span>
      <input id="ev-tags" data-i18n-placeholder="submit.field.event_tags_placeholder" />
    </label>
    <label><span data-i18n="submit.field.event_categories"></span>
      <input id="ev-categories" data-i18n-placeholder="submit.field.event_categories_placeholder" />
    </label>
  </div>
</section>

<section>
  <h2 data-i18n="submit.section.perspective">Góc nhìn của bạn</h2>
  <div class="form-grid">
    <label><span data-i18n="submit.field.role"></span>
      <select id="p-role" required>
        <option value="" data-i18n="submit.field.role_choose"></option>
        <option value="participant" data-i18n="submit.field.role.participant"></option>
        <option value="witness" data-i18n="submit.field.role.witness"></option>
        <option value="authority" data-i18n="submit.field.role.authority"></option>
        <option value="organizer" data-i18n="submit.field.role.organizer"></option>
        <option value="victim" data-i18n="submit.field.role.victim"></option>
        <option value="bystander" data-i18n="submit.field.role.bystander"></option>
      </select>
    </label>
    <label><span data-i18n="submit.field.proximity"></span>
      <select id="p-proximity">
        <option value="">—</option>
        <option value="direct" data-i18n="submit.field.proximity.direct"></option>
        <option value="nearby" data-i18n="submit.field.proximity.nearby"></option>
        <option value="secondhand" data-i18n="submit.field.proximity.secondhand"></option>
      </select>
    </label>
    <label><span data-i18n="submit.field.age"></span>
      <input id="p-age" type="number" min="0" max="120" />
    </label>
  </div>
</section>

<section>
  <h2 data-i18n="submit.section.memory">Ký ức</h2>
  <label><span data-i18n="submit.field.what_happened"></span> <small class="muted" data-i18n="submit.field.what_happened_hint"></small>
    <textarea id="m-what" rows="6" required minlength="20"></textarea>
  </label>
  <label><span data-i18n="submit.field.sensory"></span>
    <textarea id="m-sensory" rows="2"></textarea>
  </label>
  <label><span data-i18n="submit.field.emotional"></span>
    <textarea id="m-emotional" rows="2"></textarea>
  </label>
</section>

<section>
  <h2 data-i18n="submit.section.motivation">Động cơ (bắt buộc — nguyên tắc 4)</h2>
  <label><span data-i18n="submit.field.your_motivation"></span> <small class="muted" data-i18n="submit.field.your_motivation_hint"></small>
    <textarea id="motiv-your" rows="3" required minlength="10"></textarea>
  </label>
  <label><span data-i18n="submit.field.pressure"></span>
    <textarea id="motiv-pressure" rows="2"></textarea>
  </label>
  <label><span data-i18n="submit.field.fears"></span>
    <textarea id="motiv-fears" rows="2"></textarea>
  </label>
</section>

<section>
  <h2 data-i18n="submit.section.context">Nhìn lại</h2>
  <label><span data-i18n="submit.field.learned"></span>
    <textarea id="ctx-learned" rows="2"></textarea>
  </label>
  <label><span data-i18n="submit.field.different"></span>
    <textarea id="ctx-diff" rows="2"></textarea>
  </label>
</section>

<section>
  <h2 data-i18n="submit.section.consent">Đồng ý công bố</h2>
  <div class="form-grid">
    <label><input id="c-public" type="checkbox" checked /> <span data-i18n="submit.field.public"></span></label>
    <label><span data-i18n="submit.field.embargo"></span>
      <input id="c-embargo" type="date" />
    </label>
    <label><input id="c-ai" type="checkbox" checked /> <span data-i18n="submit.field.allow_ai"></span></label>
  </div>
</section>

<section>
  <h2 data-i18n="submit.section.pii_check">Kiểm tra PII</h2>
  <button id="btn-scan" type="button" data-i18n="submit.button.scan_pii"></button>
  <div id="pii-result" class="muted small"></div>
</section>

<section>
  <h2 data-i18n="submit.section.done">Hoàn tất</h2>
  <div class="controls">
    <button id="btn-preview" type="button" data-i18n="submit.button.preview"></button>
    <button id="btn-download" type="button" data-i18n="submit.button.download"></button>
  </div>
  <pre id="json-preview" class="hit" style="display:none"></pre>
  <div id="errors" style="color: var(--severe); margin-top: 0.7rem;"></div>
</section>

</main>

<footer>
  <p>
    <span data-i18n="submit.footer.guide"></span> ·
    <a href="https://github.com/Trustydev212/HumanArchive" data-i18n="footer.github">GitHub</a>
  </p>
</footer>

<script type="module" src="submit.js"></script>
<script type="module" src="pwa.js"></script>
</body>
</html>
