name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,schema]"

      - name: Validate JSON schemas
        run: |
          python -c "
          import json, jsonschema
          for path in ['core/schema/memory.json', 'core/schema/annotation.json']:
              schema = json.load(open(path))
              jsonschema.Draft7Validator.check_schema(schema)
              print(f'{path} OK')
          "

      - name: Verify archive integrity
        run: |
          python -c "
          from core.integrity import verify_archive
          bad = verify_archive('archive')
          if bad:
              print('TAMPERED memories:')
              for r in bad:
                  print(f'  claimed={r.claimed} actual={r.actual}')
              raise SystemExit(1)
          print('Archive integrity OK')
          "

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Sample historical entry generates
        run: |
          python -c "
          from core.ai_engine import generate_historical_entry
          entry = generate_historical_entry('2024-example-village-flood-demo')
          assert len(entry) > 500
          assert 'không' in entry.lower()
          print(f'Entry OK ({len(entry)} chars)')
          "

      - name: CLI smoke test (agent API)
        run: |
          humanarchive version --json | python -m json.tool
          humanarchive describe memory | python -c "import json,sys; d=json.load(sys.stdin); assert d['type']=='memory'; print('describe memory OK')"
          humanarchive describe annotation | python -c "import json,sys; d=json.load(sys.stdin); assert d['type']=='annotation'; print('describe annotation OK')"
          humanarchive capabilities | python -c "import json,sys; d=json.load(sys.stdin); names=[s['name'] for s in d['subcommands']]; assert 'submit' in names; print('capabilities OK, subcommands:', len(names))"

      - name: CLI smoke test (federation)
        run: |
          humanarchive export-bundle --output /tmp/test.tar.gz
          humanarchive import-bundle /tmp/test.tar.gz --archive /tmp/new_archive --dry-run
          humanarchive diff archive /tmp/test.tar.gz --json > /tmp/diff.json
          python -c "import json; d=json.load(open('/tmp/diff.json')); print('diff totals:', d['totals'])"

      - name: CLI smoke test (agent submit pipeline)
        run: |
          python -c "
          import json, hashlib
          m = {
            'schema_version': '1.0',
            'contributor_id': 'ha-ci-test',
            'event': {'event_id': '2024-ci-smoke-test', 'name': 'CI', 'date': '2024-01-01'},
            'perspective': {'role': 'witness'},
            'memory': {'what_happened': 'CI smoke test cho agent pipeline submit stdin.'},
            'motivation': {'your_motivation': 'CI verify agent API.'},
            'consent': {'public': True, 'allow_ai_analysis': True, 'withdrawn': False},
          }
          c = json.dumps(m, sort_keys=True, ensure_ascii=False, separators=(',',':'))
          m['memory_id'] = hashlib.sha256(c.encode()).hexdigest()[:16]
          print(json.dumps(m, ensure_ascii=False))
          " | humanarchive submit --from-stdin --dry-run --json | python -c "
          import json, sys
          r = json.load(sys.stdin)
          assert r['ok'] is True
          assert r['dry_run'] is True
          print('agent submit pipeline OK:', r['memory_id'])
          "
